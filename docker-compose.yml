version: '3.8'

services:

  db:
    image: postgres:15-alpine
    container_name: library-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: library_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  api:
    build: .
    container_name: library-api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
volumes:
  postgres_data: